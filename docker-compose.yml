version: '3.8'

services:
  load-balancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app-node-1
      - app-node-2
      - app-node-3

  app-node-1:
    build: .
    hostname: app-instance-alpha

  app-node-2:
    build: .
    hostname: app-instance-beta

  app-node-3:
    build: .
    hostname: app-instance-gama
